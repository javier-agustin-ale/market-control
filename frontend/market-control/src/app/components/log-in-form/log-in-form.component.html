<mat-dialog-content class="login-dialog-content">
  <section class="login-container">
    <mat-card class="login-card" appearance="outlined">
      <mat-card-content>
        <button
          class="close-button"
          matIconButton
          mat-dialog-close
          type="button"
          aria-label="Close login dialog"
        >
          <mat-icon>close</mat-icon>
        </button>

        <div class="login-header">
          <div class="brand-mark">
            <mat-icon aria-hidden="true">storefront</mat-icon>
          </div>
          <div>
            <p class="eyebrow">Market Control</p>
            <h1>Admin Access</h1>
          </div>
        </div>

        <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <mat-form-field
            class="input-form"
            appearance="outline"
            [class.mat-form-field-invalid]="isControlInvalid('email')"
          >
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="email" autocomplete="email" />
            <mat-icon matPrefix aria-hidden="true">mail</mat-icon>
            @if (isControlInvalid('email')) {
              <mat-error>Enter a valid email address.</mat-error>
            }
          </mat-form-field>

          <mat-form-field
            class="input-form"
            appearance="outline"
            [class.mat-form-field-invalid]="isControlInvalid('password')"
          >
            <mat-label>Password</mat-label>
            <input
              matInput
              [type]="hidePassword ? 'password' : 'text'"
              formControlName="password"
              autocomplete="current-password"
            />
            <mat-icon matPrefix aria-hidden="true">lock</mat-icon>
            <button
              matIconButton
              matSuffix
              type="button"
              [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'"
              (click)="hidePassword = !hidePassword"
            >
              <mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
            </button>
            @if (isControlInvalid('password')) {
              <mat-error>Password must contain at least 6 characters.</mat-error>
            }
          </mat-form-field>

          <!-- <div class="form-options">
            <mat-checkbox formControlName="rememberSession">Remember me</mat-checkbox>
            <button mat-button color="primary" type="button">Forgot password?</button>
          </div> -->

          <button
            class="submit-button"
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="loginForm.invalid"
          >
            Log In
          </button>
        </form>

        <!-- <div class="signup-row">
          <span>New to Market Control?</span>
          <button mat-button color="primary" type="button">Create account</button>
        </div> -->
      </mat-card-content>
    </mat-card>
  </section>
</mat-dialog-content>
