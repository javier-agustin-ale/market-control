<div class="home-container">
  <div class="header">
    <h1 class="title">{{ 'Market Control' | uppercase }}</h1>
    <div>
      <button matButton [matMenuTriggerFor]="profile">Profile</button>
      <mat-menu #profile="matMenu">
        <button mat-menu-item (click)="changeProfile(profileUserEnum.Client)">Client</button>
        <button mat-menu-item (click)="changeProfile(profileUserEnum.Admin)">Admin</button>
      </mat-menu>
    </div>
  </div>

  <mat-card class="home-card" appearance="outlined">
    <mat-card-content>
      <mat-tab-group>
        <mat-tab label="Checkout">
          <ng-template matTabContent>
            <app-checkout></app-checkout>
          </ng-template>
        </mat-tab>
        @if (profileUser$ | async; as profileUser) {
          @if (profileUser === profileUserEnum.Admin) {
            <mat-tab label="Products Management">
              <ng-template matTabContent>
                <app-products-management></app-products-management>
              </ng-template>
            </mat-tab>
          }
        }
      </mat-tab-group>
    </mat-card-content>
  </mat-card>
</div>
