@if (profileUser$ | async; as profileUser) {
  <div class="home-container">
    <div class="header">
      <h1 class="title">{{ 'Market Control' | uppercase }}</h1>
      <div>
        @if (profileUser !== profileUserEnum.Admin) {
          <button matButton (click)="adminLogIn()">Admin</button>
        } @else {
          <button matButton (click)="adminLogOut()">Log Out</button>
        }
      </div>
    </div>

    <mat-card class="home-card" appearance="outlined">
      <mat-card-content>
        <mat-tab-group [selectedIndex]="(selectedTabIndex$ | async) ?? 0">
          <mat-tab label="Checkout">
            <ng-template matTabContent>
              <app-checkout></app-checkout>
            </ng-template>
          </mat-tab>
          @if (profileUser === profileUserEnum.Admin) {
            <mat-tab label="Products Management">
              <ng-template matTabContent>
                <app-products-management></app-products-management>
              </ng-template>
            </mat-tab>
          }
        </mat-tab-group>
      </mat-card-content>
    </mat-card>
  </div>
}
